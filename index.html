<div class="cards-grid">
    <div class="card"><div class="card-top-bar" style="background:var(--blue)"></div>
      <p class="card-label">Total contratos</p>
      <p class="card-value" id="c-total" style="color:var(--blue)">—</p>
      <p class="card-sub" id="c-total-sub">—</p>
    </div>
    <div class="card"><div class="card-top-bar" style="background:var(--teal)"></div>
      <p class="card-label">Disponível para saque</p>
      <p class="card-value" id="c-fat" style="color:var(--teal)">—</p>
      <p class="card-sub">faturado geral</p>
    </div>
    <div class="card"><div class="card-top-bar" style="background:var(--green)"></div>
      <p class="card-label">Pago em conta</p>
      <p class="card-value" id="c-pago" style="color:var(--green)">—</p>
      <p class="card-sub" id="c-pago-sub">comissões recebidas</p>
      <span class="card-pill" style="background:var(--green-bg);color:var(--green)">recebido</span>
    </div>
    <div class="card"><div class="card-top-bar" style="background:var(--amber)"></div>
      <p class="card-label">A receber</p>
      <p class="card-value" id="c-receber" style="color:var(--amber)">—</p>
      <p class="card-sub" id="c-receber-sub">aguardando repasse</p>
      <span class="card-pill" style="background:var(--amber-bg);color:var(--amber)">pendente</span>
    </div>
    <div class="card"><div class="card-top-bar" style="background:var(--red)"></div>
      <p class="card-label">Saldo devedor</p>
      <p class="card-value" id="c-debito" style="color:var(--red)">—</p>
      <p class="card-sub" id="c-debito-sub">contratos em débito</p>
      <span class="card-pill" style="background:var(--red-bg);color:var(--red)">atenção</span>
    </div>
    <div class="card"><div class="card-top-bar" style="background:var(--purple)"></div>
      <p class="card-label">Volume total</p>
      <p class="card-value" id="c-volume" style="color:var(--purple)">—</p>
      <p class="card-sub">soma dos contratos</p>
    </div>
  </div>
